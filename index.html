<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Green Screen Watermark Generator - Ultra HDR 4K 120FPS</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        :root {
            --bg-green: #00B140;
            --ring-cyan: #00E5FF;
            --yt-red: #FF0000;
            --yt-active-bg: #F2F2F2;
            --yt-active-text: #606060;
            --fb-blue: #0866FF;
            --fb-active-bg: #E7F3FF;
            --fb-active-text: #0866FF;
            --ui-glass: rgba(0, 0, 0, 0.4);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body {
            background-color: var(--bg-green);
            font-family: 'Poppins', sans-serif;
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            /* Allow high-res layout rendering */
            image-rendering: high-quality; 
        }

        .fps-counter {
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--ui-glass);
            color: #FFFFFF;
            padding: 6px 14px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 14px;
            letter-spacing: 0.5px;
            backdrop-filter: blur(4px);
            z-index: 1000;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            transition: opacity 0.3s ease;
        }

        /* Invisible Boundary - Extracted Aspect Ratio (Approx 4:1) */
        .capture-boundary {
            width: 100%;
            max-width: 600px;
            aspect-ratio: 4 / 1; /* Match the red box ratio */
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            background: transparent; /* Strictly invisible */
            border: none;
        }

        .cards-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            position: absolute;
        }

        .card {
            background: #FFFFFF;
            border-radius: 100px;
            padding: 10px 30px 10px 10px;
            display: flex;
            align-items: center;
            gap: 16px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            min-width: 320px;
            will-change: transform;
            position: absolute;
            transition: opacity 0.3s ease, transform 0.3s ease;
        }

        .card.hidden {
            opacity: 0;
            pointer-events: none;
            transform: scale(0.9);
        }

        .profile-container {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            border: 3px solid var(--ring-cyan);
            padding: 2px;
            flex-shrink: 0;
        }

        .profile-container img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }

        .text-action-area {
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 6px;
        }

        .channel-name {
            font-weight: 800;
            font-size: 18px;
            color: #000000;
            line-height: 1.1;
            letter-spacing: -0.3px;
        }

        .action-row {
            display: flex;
            flex-direction: row;
            align-items: center;
            gap: 8px;
        }

        .action-btn {
            border: none;
            outline: none;
            border-radius: 20px;
            padding: 8px 18px;
            font-family: 'Poppins', sans-serif;
            font-weight: 700;
            font-size: 13px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            will-change: background-color, transform, opacity;
            transition: all 0.2s cubic-bezier(0.25, 1, 0.5, 1);
            min-width: 120px;
            height: 36px;
        }

        .icon-btn {
            border: none;
            outline: none;
            background: #F2F2F2;
            color: #0F0F0F;
            border-radius: 50%;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.25, 1, 0.5, 1);
            will-change: transform, background-color, color;
            flex-shrink: 0;
        }

        .btn-yt { background-color: var(--yt-red); color: #FFFFFF; }
        .btn-yt.active { background-color: var(--yt-active-bg); color: var(--yt-active-text); }
        .icon-btn.yt-active { background: #E5E5E5; color: #0F0F0F; }

        .btn-fb { background-color: var(--fb-blue); color: #FFFFFF; }
        .btn-fb.active { background-color: var(--fb-active-bg); color: var(--fb-active-text); }
        .icon-btn.fb-active { background: var(--fb-active-bg); color: var(--fb-blue); }

        @keyframes bell-ripple {
            0% { transform: rotate(0); }
            15% { transform: rotate(25deg); }
            30% { transform: rotate(-25deg); }
            45% { transform: rotate(15deg); }
            60% { transform: rotate(-15deg); }
            75% { transform: rotate(5deg); }
            90% { transform: rotate(-5deg); }
            100% { transform: rotate(0); }
        }

        @keyframes icon-pop {
            0% { transform: scale(0.5); opacity: 0; }
            60% { transform: scale(1.2); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }

        .icon-bell-ring {
            animation: bell-ripple 0.6s cubic-bezier(0.25, 1, 0.5, 1) forwards;
            transform-origin: top center;
        }
        
        .icon-pop {
            animation: icon-pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        /* Settings & UI Controls */
        .settings-panel {
            position: fixed;
            top: 20px;
            left: 20px;
            background: var(--ui-glass);
            padding: 15px;
            border-radius: 12px;
            backdrop-filter: blur(4px);
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 1000;
            transition: opacity 0.3s ease;
        }

        .settings-row {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #fff;
            font-size: 12px;
            font-weight: 600;
        }

        .settings-row input {
            width: 60px;
            padding: 4px;
            border-radius: 4px;
            border: none;
            outline: none;
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            text-align: center;
        }

        .settings-row span {
            opacity: 0.8;
        }

        .control-bar {
            position: fixed;
            bottom: 40px;
            display: flex;
            gap: 20px;
            align-items: center;
            transition: opacity 0.3s ease;
            z-index: 1000;
        }

        .control-block {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .control-block:active .control-icon-wrapper {
            transform: scale(0.92);
        }

        .control-label {
            font-weight: 600;
            font-size: 12px;
            color: #FFFFFF;
            letter-spacing: 1px;
        }

        .control-icon-wrapper {
            width: 48px;
            height: 48px;
            background: rgba(255, 255, 255, 0.15);
            border: 2px solid rgba(255, 255, 255, 0.6);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(5px);
            transition: transform 0.15s ease-out, background 0.2s ease, box-shadow 0.2s ease;
            will-change: transform;
        }

        .control-block.record-btn .control-icon-wrapper {
            border-color: #FF0000;
            background: rgba(255, 0, 0, 0.2);
        }
        .control-block.record-btn:hover .control-icon-wrapper {
            background: rgba(255, 0, 0, 0.4);
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.5);
        }

        .control-block:hover .control-icon-wrapper:not(.record-btn) {
            background: rgba(255, 255, 255, 0.3);
        }

        .control-icon-wrapper svg {
            width: 20px;
            height: 20px;
            fill: #FFFFFF;
        }

        .virtual-cursor {
            position: fixed;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 9999;
            will-change: transform;
            transform: translate3d(110vw, 110vh, 0) scale(1);
        }

        .virtual-cursor svg {
            filter: drop-shadow(0px 6px 8px rgba(0, 0, 0, 0.4));
        }

        /* Post-Recording Modal Overlay */
        .modal-overlay {
            position: fixed;
            top: 0; 
            left: 0; 
            width: 100vw; 
            height: 100vh;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(6px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-box {
            background: #FFFFFF;
            padding: 40px;
            border-radius: 16px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            min-width: 320px;
            transform: scale(0.9);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .modal-overlay.active .modal-box {
            transform: scale(1);
        }
    </style>
</head>
<body>

    <div class="fps-counter" id="fps-counter">120 FPS</div>

    <div class="settings-panel" id="settings-panel">
        <div class="settings-row">
            <span>RES:</span>
            <input type="number" id="res-width" value="3840" title="Custom Width">
            <span>x</span>
            <input type="number" id="res-height" value="2160" title="Custom Height">
        </div>
        <div class="settings-row">
            <span>RATIO:</span>
            <input type="text" id="custom-ratio" value="4/1" title="Custom Aspect Ratio (e.g., 16/9, 4/1)">
            <button style="margin-left:auto; padding:4px 8px; border:none; border-radius:4px; background:#fff; font-family:'Poppins'; font-weight:700; cursor:pointer;" onclick="applySettings()">APPLY</button>
        </div>
        <div class="settings-row">
            <span>FPS:</span>
            <input type="number" id="custom-fps" value="60" title="Frames Per Second" style="width: 50px;">
        </div>
    </div>

    <div class="capture-boundary" id="capture-boundary">
        <div class="cards-wrapper">
            
            <div class="card" id="card-yt">
                <div class="profile-container">
                    <img src="https://i.imgur.com/pR209Wb.jpeg" alt="T ZERONE Profile">
                </div>
                <div class="text-action-area">
                    <div class="channel-name">T ZERONE</div>
                    <div class="action-row">
                        <button id="yt-like" class="icon-btn"></button>
                        <button id="yt-sub" class="action-btn btn-yt">SUBSCRIBE</button>
                        <button id="yt-bell" class="icon-btn"></button>
                    </div>
                </div>
            </div>

            <div class="card hidden" id="card-fb">
                <div class="profile-container">
                    <img src="https://i.imgur.com/pR209Wb.jpeg" alt="T ZERONE Profile">
                </div>
                <div class="text-action-area">
                    <div class="channel-name">T ZERONE</div>
                    <div class="action-row">
                        <button id="fb-like" class="icon-btn"></button>
                        <button id="fb-follow" class="action-btn btn-fb">FOLLOW</button>
                        <button id="fb-share" class="icon-btn"></button>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <div class="control-bar" id="control-bar">
        <div class="control-block" onclick="previewEngine('yt')">
            <div class="control-label">PREVIEW 1</div>
            <div class="control-icon-wrapper">
                <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
            </div>
        </div>

        <div class="control-block record-btn" onclick="startAutomatedRecording('yt')">
            <div class="control-label">REC YT</div>
            <div class="control-icon-wrapper">
                <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="8" fill="#FF0000"/></svg>
            </div>
        </div>

        <div class="control-block record-btn" onclick="startAutomatedRecording('fb')">
            <div class="control-label">REC FB</div>
            <div class="control-icon-wrapper">
                <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="8" fill="#FF0000"/></svg>
            </div>
        </div>

        <div class="control-block" onclick="previewEngine('fb')">
            <div class="control-label">PREVIEW 2</div>
            <div class="control-icon-wrapper">
                <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
            </div>
        </div>

        <div class="control-block" onclick="resetEngine()">
            <div class="control-label">RESET</div>
            <div class="control-icon-wrapper">
                <svg viewBox="0 0 24 24"><path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
            </div>
        </div>
    </div>

    <div class="virtual-cursor" id="virtual-cursor">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M5.5 3.21V20.8L11.4 15H18.71L5.5 3.21Z" fill="#000000" stroke="#FFFFFF" stroke-width="1.5" stroke-linejoin="round"/>
        </svg>
    </div>

    <div class="modal-overlay" id="post-record-modal">
        <div class="modal-box">
            <h2 style="color: #0F0F0F; margin-bottom: 15px; font-weight: 800;">Animation is complete!</h2>
            <div class="action-row" style="justify-content: center; margin-top: 25px;">
                <button class="action-btn btn-yt" id="download-video-btn" style="min-width: 150px;" onclick="downloadRecordedVideo()">Download Video</button>
                <button class="action-btn" style="background:#F2F2F2; color:#0F0F0F; min-width: 100px;" onclick="closeModal()">Close</button>
            </div>
        </div>
    </div>

    <script>
        // 1. Hardware Accelerated FPS Counter
        const fpsElement = document.getElementById('fps-counter');
        let frameCount = 0;
        let lastFpsTime = performance.now();

        function monitorFPS() {
            const now = performance.now();
            frameCount++;
            if (now - lastFpsTime >= 1000) {
                fpsElement.textContent = `${frameCount} FPS`;
                frameCount = 0;
                lastFpsTime = now;
            }
            requestAnimationFrame(monitorFPS);
        }
        requestAnimationFrame(monitorFPS);

        // Settings Application
        function applySettings() {
            const ratio = document.getElementById('custom-ratio').value;
            const boundary = document.getElementById('capture-boundary');
            try {
                boundary.style.aspectRatio = ratio;
            } catch (e) {
                console.error("Invalid aspect ratio");
            }
        }

        // 2. SVG Resources
        const icons = {
            ytLikeOut: `<svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 9V5a3 3 0 0 0-3-3l-4 9v11h11.28a2 2 0 0 0 2-1.7l1.38-9a2 2 0 0 0-2-2.3zM7 22H4a2 2 0 0 1-2-2v-7a2 2 0 0 1 2-2h3"></path></svg>`,
            ytLikeFill: `<svg class="icon-pop" viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M14 9V5a3 3 0 0 0-3-3l-4 9v11h11.28a2 2 0 0 0 2-1.7l1.38-9a2 2 0 0 0-2-2.3zM7 22H4a2 2 0 0 1-2-2v-7a2 2 0 0 1 2-2h3"></path></svg>`,
            ytBellOut: `<svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>`,
            ytBellFill: `<svg class="icon-bell-ring" viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>`,
            
            fbLikeOut: `<svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 9V5a3 3 0 0 0-3-3l-4 9v11h11.28a2 2 0 0 0 2-1.7l1.38-9a2 2 0 0 0-2-2.3zM7 22H4a2 2 0 0 1-2-2v-7a2 2 0 0 1 2-2h3"></path></svg>`,
            fbLikeFill: `<svg class="icon-pop" viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M14 9V5a3 3 0 0 0-3-3l-4 9v11h11.28a2 2 0 0 0 2-1.7l1.38-9a2 2 0 0 0-2-2.3zM7 22H4a2 2 0 0 1-2-2v-7a2 2 0 0 1 2-2h3"></path></svg>`,
            fbShareOut: `<svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 5v4c-7 0-11 3-12 10 2.5-4 6-5 12-5v4l8-6-8-7z"/></svg>`,
            fbShareFill: `<svg class="icon-pop" viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M14 5v4c-7 0-11 3-12 10 2.5-4 6-5 12-5v4l8-6-8-7z"/></svg>`
        };

        // Initialize default DOM SVGs
        document.getElementById('yt-like').innerHTML = icons.ytLikeOut;
        document.getElementById('yt-bell').innerHTML = icons.ytBellOut;
        document.getElementById('fb-like').innerHTML = icons.fbLikeOut;
        document.getElementById('fb-share').innerHTML = icons.fbShareOut;

        // 3. State & Timing Engine
        const cursor = document.getElementById('virtual-cursor');
        let activeSequenceIds = [];
        let sequenceTimers = new Set();

        function delay(ms) {
            return new Promise(resolve => {
                const t = setTimeout(() => {
                    sequenceTimers.delete(t);
                    resolve();
                }, ms);
                sequenceTimers.add(t);
            });
        }

        function switchCard(type) {
            if(type === 'yt') {
                document.getElementById('card-yt').classList.remove('hidden');
                document.getElementById('card-fb').classList.add('hidden');
            } else {
                document.getElementById('card-fb').classList.remove('hidden');
                document.getElementById('card-yt').classList.add('hidden');
            }
        }

        function previewEngine(platformType) {
            resetEngine(); 
            switchCard(platformType);
            const seqId = Date.now();
            activeSequenceIds.push(seqId);
            
            const run = async () => {
                resetPlatform(platformType);
                cursor.style.transition = 'none';
                cursor.style.transform = `translate3d(110vw, 110vh, 0) scale(1)`;
                void cursor.offsetWidth;
                await runCursorSequence(platformType, seqId);
            };
            run();
        }

        function resetEngine() {
            activeSequenceIds = []; 
            sequenceTimers.forEach(clearTimeout);
            sequenceTimers.clear();
            
            resetPlatform('yt');
            resetPlatform('fb');

            cursor.style.transition = 'none';
            cursor.style.transform = `translate3d(110vw, 110vh, 0) scale(1)`;
            void cursor.offsetWidth; 
        }

        function resetPlatform(type) {
            if (type === 'yt') {
                const like = document.getElementById('yt-like');
                like.className = 'icon-btn';
                like.innerHTML = icons.ytLikeOut;
                
                const sub = document.getElementById('yt-sub');
                sub.className = 'action-btn btn-yt';
                sub.innerHTML = 'SUBSCRIBE';
                
                const bell = document.getElementById('yt-bell');
                bell.className = 'icon-btn';
                bell.innerHTML = icons.ytBellOut;
            } else {
                const like = document.getElementById('fb-like');
                like.className = 'icon-btn';
                like.innerHTML = icons.fbLikeOut;
                
                const follow = document.getElementById('fb-follow');
                follow.className = 'action-btn btn-fb';
                follow.innerHTML = 'FOLLOW';
                
                const share = document.getElementById('fb-share');
                share.className = 'icon-btn';
                share.innerHTML = icons.fbShareOut;
            }
        }

        function activateElement(id) {
            const el = document.getElementById(id);
            if(!el) return;
            
            if (id === 'yt-like') {
                el.classList.add('yt-active');
                el.innerHTML = icons.ytLikeFill;
            } else if (id === 'yt-sub') {
                el.classList.add('active');
                el.innerHTML = 'SUBSCRIBED';
            } else if (id === 'yt-bell') {
                el.classList.add('yt-active');
                el.innerHTML = icons.ytBellFill;
            } else if (id === 'fb-like') {
                el.classList.add('fb-active');
                el.innerHTML = icons.fbLikeFill;
            } else if (id === 'fb-follow') {
                el.classList.add('active');
                el.innerHTML = 'FOLLOWING';
            } else if (id === 'fb-share') {
                el.classList.add('fb-active');
                el.innerHTML = icons.fbShareFill;
            }
        }

        async function clickTarget(targetId, seqId) {
            if (!activeSequenceIds.includes(seqId)) return;
            const btn = document.getElementById(targetId);
            const rect = btn.getBoundingClientRect();
            
            const targetX = rect.left + rect.width / 2 - 6;
            const targetY = rect.top + rect.height / 2 - 4;
            
            cursor.style.transition = 'transform 0.4s cubic-bezier(0.25, 1, 0.5, 1)';
            cursor.style.transform = `translate3d(${targetX}px, ${targetY}px, 0) scale(1)`;
            
            await delay(400);
            if (!activeSequenceIds.includes(seqId)) return;
            
            cursor.style.transition = 'transform 0.1s ease-out';
            cursor.style.transform = `translate3d(${targetX}px, ${targetY}px, 0) scale(0.85)`;
            
            await delay(100);
            if (!activeSequenceIds.includes(seqId)) return;
            
            cursor.style.transition = 'transform 0.15s ease-in';
            cursor.style.transform = `translate3d(${targetX}px, ${targetY}px, 0) scale(1)`;
            activateElement(targetId);
            
            await delay(150);
        }

        async function runCursorSequence(type, seqId) {
            const exitX = window.innerWidth + 50;
            const exitY = window.innerHeight + 50;
            
            if (type === 'yt') {
                await clickTarget('yt-like', seqId);
                await delay(200);
                await clickTarget('yt-sub', seqId);
                await delay(200);
                await clickTarget('yt-bell', seqId);
            } else {
                await clickTarget('fb-like', seqId);
                await delay(200);
                await clickTarget('fb-follow', seqId);
                await delay(200);
                await clickTarget('fb-share', seqId);
            }
            
            if (!activeSequenceIds.includes(seqId)) return;
            
            await delay(300);
            cursor.style.transition = 'transform 0.5s cubic-bezier(0.5, 0, 0.75, 0)';
            cursor.style.transform = `translate3d(${exitX}px, ${exitY}px, 0) scale(1)`;
            await delay(500); 
        }

        // 4. Internal Canvas Rendering & MediaRecorder Engine
        let mediaRecorder;
        let recordedChunks = [];
        let isRecordingCanvas = false;
        
        // Video State Variables
        let finalVideoUrl = "";
        let finalVideoExt = "";
        let finalVideoType = "";

        async function startAutomatedRecording(type) {
            try {
                const reqWidth = parseInt(document.getElementById('res-width').value) || 3840;
                const reqHeight = parseInt(document.getElementById('res-height').value) || 2160;
                const reqFps = parseInt(document.getElementById('custom-fps').value) || 60;

                // Hide UI elements to keep clean Green Screen and lock pointer events
                document.getElementById('control-bar').style.opacity = '0';
                document.getElementById('control-bar').style.pointerEvents = 'none';
                document.getElementById('settings-panel').style.opacity = '0';
                document.getElementById('settings-panel').style.pointerEvents = 'none';
                document.getElementById('fps-counter').style.opacity = '0';

                // Prepare Hidden Render Canvas
                let renderCanvas = document.getElementById('render-canvas');
                if (!renderCanvas) {
                    renderCanvas = document.createElement('canvas');
                    renderCanvas.id = 'render-canvas';
                    renderCanvas.style.display = 'none';
                    document.body.appendChild(renderCanvas);
                }
                renderCanvas.width = reqWidth;
                renderCanvas.height = reqHeight;
                const ctx = renderCanvas.getContext('2d');

                // Attempt best format. MP4 if available, otherwise high-bitrate WebM
                let options = { mimeType: 'video/webm;codecs=vp9', videoBitsPerSecond: 100000000 };
                if (MediaRecorder.isTypeSupported('video/mp4;codecs=h264')) {
                    options = { mimeType: 'video/mp4;codecs=h264', videoBitsPerSecond: 100000000 };
                } else if (MediaRecorder.isTypeSupported('video/webm;codecs=vp8,opus')) {
                    options.mimeType = 'video/webm;codecs=vp8,opus';
                }

                // Setup Capture Stream
                const stream = renderCanvas.captureStream(reqFps);
                mediaRecorder = new MediaRecorder(stream, options);
                recordedChunks = [];

                mediaRecorder.ondataavailable = e => {
                    if (e.data.size > 0) recordedChunks.push(e.data);
                };

                mediaRecorder.onstop = () => {
                    const blob = new Blob(recordedChunks, { type: options.mimeType });
                    finalVideoUrl = URL.createObjectURL(blob);
                    finalVideoExt = options.mimeType.includes('mp4') ? 'mp4' : 'webm';
                    finalVideoType = type;

                    // Restore UI Elements Post-Recording
                    document.getElementById('control-bar').style.opacity = '1';
                    document.getElementById('control-bar').style.pointerEvents = 'auto';
                    document.getElementById('settings-panel').style.opacity = '1';
                    document.getElementById('settings-panel').style.pointerEvents = 'auto';
                    document.getElementById('fps-counter').style.opacity = '1';
                    
                    // Show post-recording modal instead of downloading immediately
                    document.getElementById('post-record-modal').classList.add('active');
                };

                resetEngine();
                switchCard(type);

                mediaRecorder.start();
                isRecordingCanvas = true;

                // Frame Capture Loop (DOM to Canvas)
                const captureFrame = async () => {
                    if (!isRecordingCanvas) return;
                    try {
                        const tempCanvas = await html2canvas(document.body, {
                            width: window.innerWidth,
                            height: window.innerHeight,
                            scale: reqWidth / window.innerWidth, // Scale to output bounds
                            useCORS: true,
                            logging: false,
                            backgroundColor: '#00B140',
                            ignoreElements: (el) => 
                                el.id === 'render-canvas' || 
                                el.id === 'post-record-modal' ||
                                el.classList.contains('settings-panel') ||
                                el.classList.contains('control-bar') ||
                                el.classList.contains('fps-counter')
                        });
                        ctx.clearRect(0, 0, reqWidth, reqHeight);
                        ctx.drawImage(tempCanvas, 0, 0, reqWidth, reqHeight);
                    } catch (err) {
                        console.error("Frame capture error:", err);
                    }
                    
                    if (isRecordingCanvas) {
                        requestAnimationFrame(captureFrame);
                    }
                };

                // Kickstart Background Canvas Render
                captureFrame();

                // 1 Second Pre-Roll Buffer
                await delay(1000);

                // Start Sequence
                const seqId = Date.now();
                activeSequenceIds.push(seqId);
                await runCursorSequence(type, seqId);

                // 1 Second Post-Roll Buffer
                await delay(1000);

                // Stop Recording automatically
                isRecordingCanvas = false;
                mediaRecorder.stop();

            } catch (err) {
                console.error("Internal recording failed: ", err);
                alert("An error occurred during internal recording setup.");
                // Restore UI on failure
                document.getElementById('control-bar').style.opacity = '1';
                document.getElementById('control-bar').style.pointerEvents = 'auto';
                document.getElementById('settings-panel').style.opacity = '1';
                document.getElementById('settings-panel').style.pointerEvents = 'auto';
                document.getElementById('fps-counter').style.opacity = '1';
            }
        }

        // Post-Recording Custom Modal Logics
        function closeModal() {
            document.getElementById('post-record-modal').classList.remove('active');
        }

        function downloadRecordedVideo() {
            if (finalVideoUrl) {
                const a = document.createElement('a');
                a.style.display = 'none';
                a.href = finalVideoUrl;
                a.download = `TZERONE_4K_HDR_${finalVideoType.toUpperCase()}.${finalVideoExt}`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                
                // Cleanup URL and auto-close modal 
                setTimeout(() => {
                    closeModal();
                    URL.revokeObjectURL(finalVideoUrl);
                    finalVideoUrl = "";
                }, 500);
            }
        }
    </script>
</body>
